#New

# USB and Bluetooth Identity
CONFIG_USB_DEVICE_PRODUCT="HP Keyboard"
CONFIG_BT_DIS_MODEL="HP Keyboard"
CONFIG_ZMK_KEYBOARD_NAME="HP Keyboard"

# Hardware IDs (HP Spoofing)
CONFIG_USB_DEVICE_VID=0x03F0
CONFIG_USB_DEVICE_PID=0x564A
CONFIG_BT_DIS_PNP_VID=0x03F0
CONFIG_BT_DIS_PNP_PID=0x564A

# Device Info Strings
CONFIG_BT_DIS_FW_REV_STR="v1.0.4"
CONFIG_BT_DIS_HW_REV_STR="v1.0.0"
CONFIG_BT_DIS_SERIAL_NUMBER_STR="SN2024040814230078"

# Optional: Manufacturer String
CONFIG_USB_DEVICE_MANUFACTURER="HP"

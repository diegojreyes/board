# USB
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_KEYBOARD_NAME="Keychron V10 Ultra 8K"
CONFIG_USB_DEVICE_MANUFACTURER="Keychron"
CONFIG_USB_DEVICE_VID=0x3434
CONFIG_USB_DEVICE_PID=0x0ca0
CONFIG_USB_DEVICE_REMOTE_WAKEUP=y
CONFIG_USB_DEVICE_SOF=y
CONFIG_USB_HID_BOOT_PROTOCOL=y
CONFIG_USB_HID_DEVICE_COUNT=3
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_USB_MAX_POWER=250
CONFIG_ENABLE_HID_INT_OUT_EP=y
CONFIG_HID_INTERRUPT_EP_MPS=64
CONFIG_KEYCHRON_FWU_STRING_NAME="KCZKVA8K"

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_RTL87X2G=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_DIS_SETTINGS=y
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_HW_REV=y
CONFIG_BT_DIS_SERIAL_NUMBER=y
CONFIG_BT_DIS_PNP_VER=0x0102
CONFIG_BT_DIS_FW_REV_STR="v1.0.2"
CONFIG_BT_DIS_HW_REV_STR="v1.0.0"
CONFIG_BT_DIS_SERIAL_NUMBER_STR="SN2024072014230078"
CONFIG_BT_ID_MAX=7
CONFIG_BT_ID_UNPAIR_MATCHING_BONDS=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_L2CAP_TX_BUF_COUNT=6
CONFIG_ZMK_BLE_KEYBOARD_REPORT_QUEUE_SIZE=64
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=30

# PPT (2.4G Wireless)
CONFIG_ZMK_PPT=y
CONFIG_REALTEK_USING_PPT_SYNC_MASTER=n
CONFIG_REALTEK_USING_PPT_SYNC_SKN=y

# ZMK HID
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_HID_CONSUMER_REPORT_SIZE=2
CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=6
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512
#CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
# CONFIG_ZMK_HID_KEYBOARD_NKRO_EXTENDED_REPORT=y

# Storage
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=10
CONFIG_SETTINGS_NVS_NAME_CACHE=y
CONFIG_SETTINGS_NVS_NAME_CACHE_SIZE=384
CONFIG_RING_BUFFER=y

# Power Management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_POLICY_CUSTOM=n # only support realtek pm flow, please disable this config
CONFIG_RUNTIME_NMI=y #customize NMI for power manager
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# Hardware Drivers
CONFIG_ADC=y
CONFIG_GPIO=y
CONFIG_LED=y
CONFIG_GPIO_ENABLE_DISABLE_INTERRUPT=y
CONFIG_I2C=y
CONFIG_SPI_RTL87X2G_DMA=y
CONFIG_WATCHDOG=y
CONFIG_COUNTER=y
CONFIG_COUNTER_TIMER_RTL87X2G=y
CONFIG_REALTEK_USING_SDK_LIB=y
CONFIG_USE_HAL_REALTEK_ENHTIM=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
#CONFIG_USB_DC_RTL87X2G_DMA=y

# Key Scan
CONFIG_RTL87X2G_KEYSCAN_GHOST_KEY_FILTER=n
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=54
# CONFIG_KSCAN_INIT_PRIORITY=95

# Encoder
CONFIG_REALTEK_AON_QDEC=y
CONFIG_RTL87X2G_USE_P6_2_AS_GPIOB21=y
CONFIG_RTL87X2G_USE_P6_3_AS_GPIOB22=y

# RGB Lighting
CONFIG_MINIMAL_LIBC_RAND=y
CONFIG_LED_STRIP=y
CONFIG_CKLED2001=y
CONFIG_CKLED2001_SPI=y

# System Misc
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=3000
CONFIG_LAUNCHER_USER_SET_DEBOUNCE=y
CONFIG_RTK_DFU=y

